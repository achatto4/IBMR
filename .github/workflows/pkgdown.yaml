name: pkgdown

on:
  push:
    branches: [main, master]
    paths-ignore:
      - docs/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pkgdown:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown
          needs: website

      - name: Install package
        run: R CMD INSTALL .

      - name: Clean existing site
        run: Rscript -e 'pkgdown::clean_site(force = TRUE)'

      - name: Build pkgdown site
        run: Rscript -e 'pkgdown::build_site(new_process = FALSE, install = FALSE)'

      - name: Show generated site files
        run: find docs -maxdepth 3 -type f | sort

      - name: Commit and push rendered site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs
          git diff --cached --quiet && exit 0
          git commit -m "Build pkgdown site"
          git push
